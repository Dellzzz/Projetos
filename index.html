<!DOCTYPE html>

        /* Estilos básicos (CSS) para a página */
        body {

            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 40px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 1px;
        }

            margin-bottom: 30px;

        /* Container para os links das turmas */
        .turmas-container {

            justify-content: center;
            gap: 20px;

        }

        .turma-link {
            display: inline-block;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            font-size: 1.5em;
            font-weight: bold;
            padding: 30px 40px;
            border-radius: 12px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 120px;
        }

        .turma-link:hover {
            background-color: #2980b9;
            transform: translateY(-5px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
